<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Pour toi — Youna</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
<style>
  @page {
    size: A4 portrait;
    margin: 0;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 210mm;
    height: 297mm;
    overflow: hidden;
    background: #1E1A24;
    font-family: 'Inter', 'system-ui', sans-serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .sheet {
    width: 210mm;
    height: 297mm;
    background: #1E1A24;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Bordure exterieure */
  .sheet .border-outer {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    bottom: 8px;
    border: 1px solid rgba(212,168,83,0.15);
    border-radius: 1px;
    pointer-events: none;
  }

  /* Bordure interieure */
  .sheet .border-inner {
    position: absolute;
    top: 18px;
    left: 18px;
    right: 18px;
    bottom: 18px;
    border: 1px solid rgba(212,168,83,0.25);
    border-radius: 1px;
    pointer-events: none;
  }

  /* Coins */
  .corner {
    position: absolute;
    width: 48px;
    height: 48px;
    pointer-events: none;
  }
  .corner-tl { top: 14px; left: 14px; border-top: 2px solid rgba(212,168,83,0.5); border-left: 2px solid rgba(212,168,83,0.5); }
  .corner-tr { top: 14px; right: 14px; border-top: 2px solid rgba(212,168,83,0.5); border-right: 2px solid rgba(212,168,83,0.5); }
  .corner-bl { bottom: 14px; left: 14px; border-bottom: 2px solid rgba(212,168,83,0.5); border-left: 2px solid rgba(212,168,83,0.5); }
  .corner-br { bottom: 14px; right: 14px; border-bottom: 2px solid rgba(212,168,83,0.5); border-right: 2px solid rgba(212,168,83,0.5); }

  /* Glows */
  .sheet .glow-top {
    position: absolute;
    top: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 550px;
    height: 550px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,168,83,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .sheet .glow-bottom {
    position: absolute;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(123,107,138,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Cercles ornementaux */
  .sheet .circle-1 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 370px;
    height: 370px;
    border-radius: 50%;
    border: 1px solid rgba(212,168,83,0.06);
    pointer-events: none;
  }

  .sheet .circle-2 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 420px;
    height: 420px;
    border-radius: 50%;
    border: 1px dashed rgba(212,168,83,0.04);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 40px;
  }

  .line-ornament {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 32px;
  }

  .line-ornament .line { width: 75px; height: 1px; background: rgba(212,168,83,0.25); }
  .line-ornament .line-center { width: 75px; height: 1px; background: rgba(212,168,83,0.4); }
  .line-ornament .dot { width: 6px; height: 6px; background: #D4A853; border-radius: 50%; opacity: 0.5; }

  .label {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    color: #D4A853;
    font-size: 28px;
    letter-spacing: 8px;
    opacity: 0.8;
    margin-bottom: 10px;
  }

  .name {
    font-family: 'Playfair Display', Georgia, serif;
    color: #FFF8EC;
    font-size: 100px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 12px;
  }

  .nickname {
    font-family: 'Caveat', cursive;
    color: #D4A853;
    font-size: 30px;
    opacity: 0.5;
    margin-bottom: 24px;
  }

  .divider {
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #D4A853, transparent);
    margin: 0 auto 32px;
  }

  .subtitle-1 {
    font-family: 'Caveat', cursive;
    color: #E8D5B7;
    font-size: 38px;
    opacity: 0.55;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .subtitle-2 {
    font-family: 'Caveat', cursive;
    color: #E8D5B7;
    font-size: 32px;
    opacity: 0.45;
    line-height: 1.3;
    margin-bottom: 40px;
  }

  .qr-inner-border {
    position: absolute;
    inset: -22px;
    border: 1px solid rgba(212,168,83,0.15);
    border-radius: 28px;
    pointer-events: none;
  }

  .qr-container {
    position: relative;
    display: inline-block;
    margin-bottom: 32px;
  }

  .qr-wrapper {
    border: 3px solid rgba(212,168,83,0.5);
    padding: 14px;
    border-radius: 20px;
    width: 190px;
    height: 190px;
    background: rgba(255,248,236,0.04);
    box-shadow: 0 0 50px rgba(212,168,83,0.15), 0 0 90px rgba(212,168,83,0.05);
  }

  .qr-wrapper svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .url {
    font-family: 'Inter', 'system-ui', sans-serif;
    color: #7B6B8A;
    font-size: 14px;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.65;
    margin-bottom: 6px;
  }

  .date {
    font-family: 'Inter', 'system-ui', sans-serif;
    color: #9B8BAA;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 28px;
  }

  .divider-sub {
    width: 90px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,168,83,0.35), transparent);
    margin: 0 auto 26px;
  }

  .quote {
    font-family: 'Caveat', cursive;
    color: #E8D5B7;
    font-size: 26px;
    opacity: 0.4;
    line-height: 1.7;
    max-width: 500px;
    margin-bottom: 10px;
  }

  .quote-attribution {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    color: #D4A853;
    font-size: 18px;
    opacity: 0.35;
    margin-bottom: 20px;
  }

  .heart {
    margin: 12px 0;
    font-size: 32px;
    color: #D4A853;
    opacity: 0.35;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }

  .star-4pt {
    position: absolute;
    pointer-events: none;
    opacity: 0.3;
  }

  .star-4pt .h { position: absolute; top: 5px; left: 0; width: 12px; height: 2px; background: #D4A853; border-radius: 1px; }
  .star-4pt .v { position: absolute; top: 0; left: 5px; width: 2px; height: 12px; background: #D4A853; border-radius: 1px; }

  @media screen {
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0d0a12;
    }
    .sheet {
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
      border-radius: 4px;
    }
  }
</style>
</head>
